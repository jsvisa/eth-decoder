name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check "app/**/*.{js,json}" "tests/**/*.js" "**/*.md" "*.json"

      - name: Lint
        run: npm run lint

  test:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and API integration tests with coverage
        run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install abi_server
        run: pip install -e "."
        working-directory: abi_server

      - name: Create SQLite DB from CSV
        run: |
          python3 - <<'EOF'
          import csv, sqlite3
          conn = sqlite3.connect("/tmp/abi_server.db")
          conn.execute("""
            CREATE TABLE func_signs (
              pkey TEXT PRIMARY KEY, byte_sign TEXT NOT NULL,
              text_sign TEXT NOT NULL, abi TEXT, score INTEGER DEFAULT 0
            )
          """)
          conn.execute("CREATE INDEX idx_byte_sign ON func_signs (byte_sign)")
          with open("abi_server/tests/evm.func_sign.csv") as f:
            rows = [(r["pkey"],r["byte_sign"],r["text_sign"],r["abi"],int(r["score"])) for r in csv.DictReader(f)]
          conn.executemany("INSERT OR IGNORE INTO func_signs VALUES (?,?,?,?,?)", rows)
          conn.commit()
          conn.close()
          print(f"Loaded {len(rows)} rows")
          EOF

      - name: Start abi_server
        working-directory: abi_server
        run: nohup python -m uvicorn main:app --host 0.0.0.0 --port 8000 > /tmp/abi_server.log 2>&1 &
        env:
          POSTGRES_DATABASE_URL: sqlite:////tmp/abi_server.db

      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production app
        run: npm run build
        env:
          BACKEND_URL: http://localhost:8000

      - name: Start production server
        run: nohup npm run start > /tmp/nextjs.log 2>&1 &
        env:
          BACKEND_URL: http://localhost:8000

      - name: Wait for servers to be ready
        run: npx wait-on http://localhost:3000 http://localhost:8000/openapi.json --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== abi_server ===" && cat /tmp/abi_server.log || true
          echo "=== nextjs ===" && cat /tmp/nextjs.log || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

